name: gg_updater
description: In-app update system for GG apps. Check → Download → Install.
version: 1.3.6

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.7
  dio: ^5.9.2
  path_provider: ^2.1.5
  package_info_plus: ">=8.0.0 <10.0.0"


flutter:
  plugin:
    platforms:
      android:
        package: com.gg.updater
        pluginClass: GgUpdaterPlugin
